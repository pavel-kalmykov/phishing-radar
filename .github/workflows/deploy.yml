name: Deploy to Fly.io

on:
  push:
    branches: [main]
    paths:
      - 'streaming/**'
      - 'batch/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
      - 'deploy/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        app:
          - { name: producer,  config: deploy/producer/fly.toml }
          - { name: detector, config: deploy/detector/fly.toml }
          - { name: sink,     config: deploy/sink/fly.toml }
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy ${{ matrix.app.name }}
        run: flyctl deploy --config ${{ matrix.app.config }} --dockerfile Dockerfile --app phishing-radar-${{ matrix.app.name }} --ha=false
        env:
          FLY_ACCESS_TOKEN: ${{ secrets.FLY_ACCESS_TOKEN }}
