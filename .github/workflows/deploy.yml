name: Deploy to Fly.io

on:
  push:
    branches: [main]
    paths:
      - 'streaming/**'
      - 'batch/**'
      - 'kestra/**'
      - 'dbt/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Dockerfile'
      - 'Dockerfile.kestra'
      - 'Dockerfile.detector'
      - 'deploy/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # GitHub environment 'production' must be configured in repo Settings >
    # Environments with at least one required reviewer. This blocks the matrix
    # from running until the reviewer approves, so a typo on main does not
    # redeploy four apps in seconds.
    environment: production
    strategy:
      fail-fast: false
      matrix:
        app:
          - { name: producer, config: deploy/producer/fly.toml, dockerfile: Dockerfile }
          - { name: detector, config: deploy/detector/fly.toml, dockerfile: Dockerfile.detector }
          - { name: sink,     config: deploy/sink/fly.toml,     dockerfile: Dockerfile }
          - { name: kestra,   config: deploy/kestra/fly.toml,   dockerfile: Dockerfile.kestra }
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy ${{ matrix.app.name }}
        run: >
          flyctl deploy
          --config ${{ matrix.app.config }}
          --dockerfile ${{ matrix.app.dockerfile }}
          --app phishing-radar-${{ matrix.app.name }}
          --ha=false
        env:
          FLY_ACCESS_TOKEN: ${{ secrets.FLY_ACCESS_TOKEN }}
