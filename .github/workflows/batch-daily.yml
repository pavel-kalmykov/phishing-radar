name: Daily batch pipeline

# Runs the five dlt ingestions + dbt run + dbt test. Kestra's job on paper
# but we let GitHub Actions do it in the cloud because it is free and reliable.
# The Kestra flow at kestra/flows/batch_pipeline.yml stays in the repo as the
# reference implementation for anyone who wants to run it locally via
# docker-compose.

on:
  schedule:
    # Cron is configurable - tweak this expression to test at different cadences
    - cron: "0 6 * * *"   # daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      skip_maxmind:
        description: "Skip the MaxMind CSV ingestion"
        type: boolean
        default: false

concurrency:
  group: batch-daily
  cancel-in-progress: false

jobs:
  batch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
      MAXMIND_LICENSE_KEY: ${{ secrets.MAXMIND_LICENSE_KEY }}
      DESTINATION__MOTHERDUCK__CREDENTIALS__DATABASE: phishing_radar
      MD_CATALOG: phishing_radar
      MD_DATABASE: main
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"
      - name: Install dependencies
        run: uv sync --no-dev

      - name: Ingest CISA KEV
        run: uv run python -m batch.ingest_cisa_kev
      - name: Ingest Feodo Tracker
        run: uv run python -m batch.ingest_feodo
      - name: Ingest Spamhaus DROP
        run: uv run python -m batch.ingest_spamhaus
      - name: Ingest MITRE ATT&CK
        run: uv run python -m batch.ingest_mitre
      - name: Ingest MaxMind GeoLite2 CSV
        if: ${{ !inputs.skip_maxmind && env.MAXMIND_LICENSE_KEY != '' }}
        run: uv run python -m batch.ingest_maxmind

      - name: Install dev deps for dbt
        run: uv sync --all-extras

      - name: dbt deps
        working-directory: dbt
        run: uv run dbt deps --profiles-dir .

      - name: dbt run
        working-directory: dbt
        run: uv run dbt run --profiles-dir .

      - name: dbt test
        working-directory: dbt
        run: uv run dbt test --profiles-dir .
