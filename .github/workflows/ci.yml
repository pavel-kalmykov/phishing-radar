name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pytest
        run: uv run pytest -v

      - name: dbt deps
        run: cd dbt && uv run dbt deps --profiles-dir .

      - name: dbt parse
        env:
          DBT_TARGET: ci
        run: cd dbt && uv run dbt parse --profiles-dir .

      - name: dbt test (archive marts)
        env:
          DBT_TARGET: ci
        run: >
          cd dbt && uv run dbt test --profiles-dir .
          --select
          mart_pipeline_health
          mart_recent_suspicious
          mart_c2_active
          mart_dashboard_suspicious_1h
          mart_dashboard_suspicious_5min
          mart_dashboard_brand_daily
          --exclude
          assert_pipeline_healthy
