version: 2

models:
  - name: mart_kev_pulse
    description: CISA KEV entries added in the last year, with freshness buckets
    columns:
      - name: cve_id
        tests:
          - not_null
          - unique
      - name: freshness_bucket
        tests:
          - accepted_values:
              values: ['last_week', 'last_month', 'last_quarter', 'last_year']
  - name: mart_c2_active
    description: >
      Active botnet C2 IPs. Union of abuse.ch Feodo Tracker (curated, with
      country) and ThreatFox (crowd-sourced, geolocated via MaxMind). Dedup
      prefers Feodo when an IP appears in both.
    columns:
      - name: ip_address
        tests:
          - not_null
          - unique
      - name: source
        tests:
          - accepted_values:
              values: ['feodo', 'threatfox']
      - name: status
        tests:
          - accepted_values:
              values: ['online']
  - name: mart_c2_mitre_enriched
    description: mart_c2_active joined with MITRE ATT&CK software catalog
  - name: mart_spamhaus_by_country
    description: Spamhaus DROP/EDROP blocks bucketed by prefix size
  - name: mart_mitre_malware_catalog
    description: MITRE ATT&CK malware + tools with canonical ATT&CK IDs
    columns:
      - name: attack_id
        tests:
          - not_null
  - name: mart_suspicious_certs_daily
    description: Daily counts of flagged certificates per (brand, category, reason)
  - name: mart_top_impersonated_brands
    description: 7-day ranking of most impersonated brands
  - name: mart_issuer_volume_1min
    description: Per-minute suspicious-cert ratio per issuing CA (from Flink windows)
  - name: mart_dashboard_kpis
    description: Single-row headline KPIs for the dashboard hero strip
  - name: mart_dashboard_suspicious_1h
    description: Per-hour, per-issuer volume rolled up from 5-min mart, with partial-hour flag
    columns:
      - name: hour
        tests:
          - not_null
      - name: issuer_cn
        tests:
          - not_null
      - name: flagged
      - name: unique_domains
      - name: is_partial_hour
  - name: mart_dashboard_suspicious_5min
    description: Per-5-minute, per-issuer volume of flagged certs -- base grain for the time-series chart
    columns:
      - name: minute
        tests:
          - not_null
      - name: issuer_cn
        tests:
          - not_null
      - name: flagged
      - name: unique_domains
  - name: mart_dashboard_brand_daily
    description: Per-day, per-issuer, per-brand counts for the top-brands chart
    columns:
      - name: day
        tests:
          - not_null
      - name: issuer_cn
        tests:
          - not_null
      - name: brand
        tests:
          - not_null
      - name: hits
  - name: mart_dashboard_top_issuers
    description: Top 20 CAs that signed flagged certs, with counts (deprecated — superseded by mart_dashboard_suspicious_1h)
  - name: mart_dashboard_kev_vendors
    description: Top KEV vendors with explicit ransomware ratio percentage
  - name: mart_dashboard_kev_monthly
    description: Monthly KEV additions with partial-month flag
  - name: mart_dashboard_c2_by_country
    description: C2 counts per country across Feodo + ThreatFox sources
  - name: mart_pipeline_health
    description: >
      Per-minute pipeline health: single hop WebSocket → Detector.
      certstream_producer ws_cert_count vs detector total_count (summed across
      issuers). is_healthy requires loss percentage ≤ 1%. sink_alive requires a
      heartbeat from each sink worker within the last 2 minutes.
    columns:
      - name: window_ts
        tests:
          - not_null
      - name: ws_count
      - name: processed_count
        tests:
          - not_null
      - name: ws_to_detector_lost
      - name: ws_to_detector_loss_pct
      - name: is_healthy
        tests:
          - not_null
      - name: sink_alive
        tests:
          - not_null
  - name: mart_recent_suspicious
    description: >
      Last 3 days of suspicious certs, ordered by seen_at_ts DESC. The
      dashboard reads from this instead of scanning the full staging table
      with ORDER BY + LIMIT. Refreshed daily; the last hour is covered by
      a live fallback query.
    columns:
      - name: seen_at_ts
        tests:
          - not_null
      - name: primary_domain
      - name: issuer_cn
      - name: max_score
      - name: detections_raw
