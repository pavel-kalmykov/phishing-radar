version: 2

sources:
  - name: phishing_radar
    description: Raw tables loaded by dlt ingestion pipelines and the streaming sink
    database: "{{ env_var('MD_CATALOG', '') }}"
    schema: "{{ env_var('MD_DATABASE', 'main') }}"
    tables:
      - name: cisa_kev
        description: CISA Known Exploited Vulnerabilities catalog (refreshed daily by Kestra; CISA publishes irregular updates so max(date_added) may legitimately be days old even when the loader ran)
        loaded_at_field: cast(date_added as timestamp)
        freshness:
          warn_after: {count: 14, period: day}
          error_after: {count: 30, period: day}
        columns:
          - name: cve_id
            tests:
              - not_null
              - unique
      - name: feodo_c2
        description: abuse.ch Feodo Tracker active C2 IPs (refreshed every minutes by Kestra)
        loaded_at_field: cast(last_online as timestamp)
        freshness:
          warn_after: {count: 6, period: hour}
          error_after: {count: 24, period: hour}
        columns:
          - name: ip_address
            tests:
              - not_null
      - name: threatfox_iocs
        description: abuse.ch ThreatFox IoCs (botnet_cc threat_type only, refreshed every minutes by Kestra)
        loaded_at_field: cast(last_seen_utc as timestamp)
        freshness:
          warn_after: {count: 6, period: hour}
          error_after: {count: 24, period: hour}
      - name: geoip_country_blocks
        description: MaxMind GeoLite2 IPv4 country CIDR blocks (refreshed weekly by Kestra; rows have no per-row timestamp so freshness lives at the dlt _dlt_loads metadata layer)
      - name: geoip_country_locations
        description: MaxMind GeoLite2 geoname_id to ISO country lookup
      - name: geoip_city_blocks
        description: MaxMind GeoLite2 IPv4 city CIDR blocks with latitude/longitude
      - name: geoip_city_locations
        description: MaxMind GeoLite2 geoname_id to city/region/country lookup
      - name: spamhaus_drop
        description: Spamhaus DROP and EDROP CIDR blocklists (refreshed daily by Kestra; rows have no per-row timestamp so freshness lives at the dlt _dlt_loads metadata layer)
        columns:
          - name: cidr
            tests:
              - not_null
      - name: mitre_techniques
        description: MITRE ATT&CK Enterprise attack patterns (monthly cadence; rows have no per-row timestamp so freshness lives at the dlt _dlt_loads metadata layer)
        columns:
          - name: attack_id
            tests:
              - not_null
      - name: mitre_software
        description: MITRE ATT&CK malware and tools
      - name: mitre_groups
        description: MITRE ATT&CK intrusion sets (APTs)
      - name: raw_suspicious_certs
        description: Suspicious certificates flagged by the detector (landed from Kafka topic `suspicious_certs`)
        loaded_at_field: received_at
        freshness:
          warn_after: {count: 30, period: minute}
          error_after: {count: 4, period: hour}
      - name: raw_cert_stats_1min
        description: Per-minute tumbling-window cert issuance stats per CA (landed from Kafka topic `cert_stats_1min`)
        loaded_at_field: received_at
        freshness:
          warn_after: {count: 30, period: minute}
          error_after: {count: 4, period: hour}
      - name: raw_pipeline_events
        description: Pipeline observability events — volume counts, worker heartbeats, freeze detections. Written by the sink watchdog, sink workers, and pipeline_monitor.
        loaded_at_field: event_at
        freshness:
          warn_after: {count: 5, period: minute}
          error_after: {count: 15, period: minute}
