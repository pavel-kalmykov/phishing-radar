# Phishing Radar: certstream-server-go.
# Fans out Certificate Transparency logs to a single WebSocket endpoint.
# Other apps consume from it via ws://phishing-radar-certstream.internal:8080/full-stream
app = "phishing-radar-certstream"
primary_region = "cdg"

[build]
  image = "0rickyy0/certstream-server-go:latest"

[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
