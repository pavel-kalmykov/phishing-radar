# Phishing Radar: Kestra orchestrator.
# Schedules the daily batch flow (dlt ingestions + dbt run + dbt test).
app = "phishing-radar-kestra"
primary_region = "cdg"

[build]
  image = "kestra/kestra:v0.19.12"

[experimental]
  cmd = ["server", "standalone"]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "kestra_data"
  destination = "/app/storage"

[env]
  JAVA_OPTS = "-Xms256m -Xmx768m -XX:+UseG1GC"
  KESTRA_CONFIGURATION = """
micronaut:
  io:
    watch:
      enabled: true
      paths:
        - /app/flows
kestra:
  repository:
    type: h2
  queue:
    type: memory
  storage:
    type: local
    local:
      base-path: /app/storage
  server:
    basic-auth:
      enabled: false
datasources:
  h2:
    url: jdbc:h2:/app/storage/db
    driverClassName: org.h2.Driver
    username: sa
    password: ""
"""

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"
