# Phishing Radar: Kafka -> MotherDuck sink.
# Reads the three streaming topics from Redpanda Cloud and lands them into
# `phishing_radar.main.raw_*` tables in MotherDuck.
app = "phishing-radar-sink"
primary_region = "cdg"

[build]

[env]
  CERTSTREAM_TOPIC = "certstream_events"
  SUSPICIOUS_TOPIC = "suspicious_certs"
  STATS_TOPIC = "cert_stats_1min"
  MD_CATALOG = "phishing_radar"
  MD_DATABASE = "main"

[[vm]]
  # 256mb was too tight: Python + confluent-kafka + DuckDB (for MotherDuck
  # inserts) sits at ~140mb RSS steady-state, so the first Kafka fetch that
  # doesn't fit the leftover budget OOM-kills the process. Observed a kill
  # every 3-5 min at 140mb steady RSS; 512mb gives comfortable headroom.
  size = "shared-cpu-1x"
  memory = "512mb"

[processes]
  app = "python -m streaming.sink.kafka_to_md"
