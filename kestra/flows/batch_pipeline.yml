id: batch_pipeline
namespace: phishing_radar
description: |
  Daily batch refresh for Phishing Radar.

  Runs the five dlt ingestions (CISA KEV, Feodo, Spamhaus, MITRE, MaxMind CSV),
  then `dbt run` and `dbt test` against MotherDuck. Cron is controlled by the
  `BATCH_CRON` input so we can crank it up to `"@hourly"` (or even `"* * * * *"`)
  during development and drop it back to `"0 6 * * *"` for production.

inputs:
  - id: cron
    type: STRING
    defaults: "0 6 * * *"
    description: Cron expression that drives this flow.

tasks:
  - id: ingest_cisa_kev
    type: io.kestra.plugin.scripts.python.Commands
    containerImage: ghcr.io/pavel-kalmykov/phishing-radar-batch:latest
    commands:
      - python -m batch.ingest_cisa_kev
    env:
      MOTHERDUCK_TOKEN: "{{ secret('MOTHERDUCK_TOKEN') }}"
      DESTINATION__MOTHERDUCK__CREDENTIALS__DATABASE: phishing_radar
      MD_DATABASE: main

  - id: ingest_feodo
    type: io.kestra.plugin.scripts.python.Commands
    containerImage: ghcr.io/pavel-kalmykov/phishing-radar-batch:latest
    commands:
      - python -m batch.ingest_feodo
    env:
      MOTHERDUCK_TOKEN: "{{ secret('MOTHERDUCK_TOKEN') }}"
      DESTINATION__MOTHERDUCK__CREDENTIALS__DATABASE: phishing_radar
      MD_DATABASE: main

  - id: ingest_spamhaus
    type: io.kestra.plugin.scripts.python.Commands
    containerImage: ghcr.io/pavel-kalmykov/phishing-radar-batch:latest
    commands:
      - python -m batch.ingest_spamhaus
    env:
      MOTHERDUCK_TOKEN: "{{ secret('MOTHERDUCK_TOKEN') }}"
      DESTINATION__MOTHERDUCK__CREDENTIALS__DATABASE: phishing_radar
      MD_DATABASE: main

  - id: ingest_mitre
    type: io.kestra.plugin.scripts.python.Commands
    containerImage: ghcr.io/pavel-kalmykov/phishing-radar-batch:latest
    commands:
      - python -m batch.ingest_mitre
    env:
      MOTHERDUCK_TOKEN: "{{ secret('MOTHERDUCK_TOKEN') }}"
      DESTINATION__MOTHERDUCK__CREDENTIALS__DATABASE: phishing_radar
      MD_DATABASE: main

  - id: ingest_maxmind
    type: io.kestra.plugin.scripts.python.Commands
    containerImage: ghcr.io/pavel-kalmykov/phishing-radar-batch:latest
    commands:
      - python -m batch.ingest_maxmind
    env:
      MOTHERDUCK_TOKEN: "{{ secret('MOTHERDUCK_TOKEN') }}"
      MAXMIND_LICENSE_KEY: "{{ secret('MAXMIND_LICENSE_KEY') }}"
      DESTINATION__MOTHERDUCK__CREDENTIALS__DATABASE: phishing_radar
      MD_DATABASE: main

  - id: dbt_run
    type: io.kestra.plugin.scripts.python.Commands
    containerImage: ghcr.io/pavel-kalmykov/phishing-radar-batch:latest
    commands:
      - cd dbt && dbt run --profiles-dir .
    env:
      MOTHERDUCK_TOKEN: "{{ secret('MOTHERDUCK_TOKEN') }}"
      MD_CATALOG: phishing_radar
      MD_DATABASE: main

  - id: dbt_test
    type: io.kestra.plugin.scripts.python.Commands
    containerImage: ghcr.io/pavel-kalmykov/phishing-radar-batch:latest
    commands:
      - cd dbt && dbt test --profiles-dir .
    env:
      MOTHERDUCK_TOKEN: "{{ secret('MOTHERDUCK_TOKEN') }}"
      MD_CATALOG: phishing_radar
      MD_DATABASE: main

triggers:
  - id: daily
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "{{ inputs.cron ?? '0 6 * * *' }}"
