# Brands the detector watches for impersonation attempts. Format:
#   brands:
#     <canonical-second-level-domain>: <category>
#
# Detector runtime reads this file from the path given by
# STREAMING_BRAND_LIST_PATH (default: this file). Adding a brand is a config
# change. A redeploy is still required for the new file to ship in the image
# but the data and the code are now decoupled, and an operator running the
# detector locally can point at a different list without editing Python.
brands:
  google: internet
  amazon: ecommerce
  paypal: finance
  microsoft: tech
  office365: tech
  outlook: tech
  apple: tech
  netflix: media
  facebook: social
